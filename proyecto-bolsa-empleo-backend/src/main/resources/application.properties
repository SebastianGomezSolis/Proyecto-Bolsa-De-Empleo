spring.application.name=proyecto-bolsa-empleo-backend
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo_p2
#Poner credenciales de la base de datos
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=8080

# JWT
app.jwt.secret=BolsaEmpleo2026SecretKeyParaFirmarTokensJWT256bits
app.jwt.expiration-ms=86400000

# Los CV se guardan en uploads/curriculos/ relativo al directorio de trabajo del backend
# y se sirven como recursos estaticos por Spring Boot en /uploads/**
