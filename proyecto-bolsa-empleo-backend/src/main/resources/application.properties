spring.application.name=proyecto-bolsa-empleo-backend
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo_p2
#Poner credenciales de la base de datos
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=8080

# Multipart (subida de CVs)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
app.jwt.secret=BolsaEmpleo2026SecretKeyParaFirmarTokensJWT256bits
app.jwt.expiration-ms=86400000

# Ruta donde se guardan los CVs subidos
app.cv.upload-dir=../Proyecto-Bolsa-De-Empleo/proyecto-bolsa-empleo-frontend/public/uploads/curriculos
